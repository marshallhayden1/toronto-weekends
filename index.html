<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toronto Summer 2026 — Visit Us!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══ Reset & Variables ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFBF5;
      --card: #FFFFFF;
      --primary: #0D6B6E;
      --primary-light: #E6F5F5;
      --primary-dark: #094F51;
      --coral: #D4644A;
      --coral-light: #FDF0ED;
      --gold: #D4A14B;
      --gold-light: #FEF7EC;
      --gray-100: #F5F2EE;
      --gray-200: #E8E4DE;
      --gray-300: #C5C0B8;
      --gray-400: #9B9588;
      --gray-500: #6E695F;
      --gray-700: #3D3A34;
      --gray-900: #1A1815;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--gray-900);
      padding-bottom: 60px;
    }

    /* ═══ Hero ═══ */
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 48px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40%; right: -20%;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -60%; left: -10%;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: #fff;
      font-weight: 400;
      line-height: 1.15;
      position: relative; z-index: 1;
    }
    .hero p {
      color: rgba(255,255,255,0.82);
      font-size: 1.05rem;
      margin-top: 10px;
      font-weight: 400;
      position: relative; z-index: 1;
    }

    /* ═══ Legend ═══ */
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 18px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--gray-200);
      font-size: 0.82rem;
      color: var(--gray-500);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 4px; }

    /* ═══ Content ═══ */
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .month-section { margin-bottom: 36px; }
    .month-label {
      font-family: var(--font-display);
      font-size: 1.65rem;
      color: var(--gray-700);
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .weekend-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    /* ═══ Weekend Cards ═══ */
    .weekend-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid var(--gray-200);
      padding: 18px;
      transition: all 0.2s ease;
    }
    .weekend-card.available {
      border-color: var(--primary);
      cursor: pointer;
      background: var(--primary-light);
    }
    .weekend-card.available:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--primary-dark);
    }
    .weekend-card.booked {
      border-color: var(--coral);
      background: var(--coral-light);
    }
    .weekend-card.blocked {
      border-color: var(--gray-200);
      background: repeating-linear-gradient(-45deg, var(--gray-100), var(--gray-100) 4px, var(--card) 4px, var(--card) 8px);
      opacity: 0.6;
    }
    .card-dates {
      font-weight: 700;
      font-size: 1rem;
      color: var(--gray-900);
      margin-bottom: 6px;
    }
    .card-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-available { background: var(--primary); color: #fff; }
    .badge-booked { background: var(--coral); color: #fff; }
    .badge-blocked { background: var(--gray-200); color: var(--gray-500); }
    .card-guest {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--gray-700);
      font-weight: 600;
    }
    .card-detail {
      font-size: 0.8rem;
      color: var(--gray-400);
      margin-top: 3px;
    }

    /* ═══ Modal ═══ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal {
      background: var(--card);
      border-radius: 16px;
      max-width: 440px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s ease;
    }
    .modal-header { padding: 24px 24px 0; }
    .modal-header h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--gray-900);
    }
    .modal-header p {
      color: var(--gray-400);
      font-size: 0.88rem;
      margin-top: 4px;
    }
    .modal-body { padding: 20px 24px 24px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      font-size: 1rem;
      font-family: var(--font-body);
      color: var(--gray-900);
      transition: border-color 0.2s;
      background: var(--bg);
    }
    .field input:focus { outline: none; border-color: var(--primary); }
    .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 9px 16px;
      border: 2px solid var(--gray-200);
      border-radius: 100px;
      font-size: 0.88rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--card);
      color: var(--gray-700);
      font-weight: 500;
    }
    .pill:hover { border-color: var(--primary); }
    .pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .modal-actions {
      display: flex;
      gap: 10px;
      padding: 0 24px 24px;
    }
    .btn {
      flex: 1;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--gray-500);
      border: 2px solid var(--gray-200);
    }
    .btn-ghost:hover { background: var(--gray-100); }

    .message-box {
      background: var(--bg);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 16px;
      font-size: 0.92rem;
      white-space: pre-wrap;
      line-height: 1.6;
      color: var(--gray-700);
      margin-bottom: 16px;
    }
    .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      border: 2px solid var(--gray-200);
      background: var(--card);
      color: var(--gray-700);
      transition: all 0.15s;
      text-decoration: none;
    }
    .action-btn:hover { border-color: var(--primary); color: var(--primary); }

    .loading-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      color: var(--gray-400);
      font-size: 0.92rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-bar {
      text-align: center;
      padding: 14px;
      margin: 16px;
      background: var(--gold-light);
      border-radius: 10px;
      color: var(--gray-700);
      font-size: 0.88rem;
    }

    @media (max-width: 500px) {
      .hero h1 { font-size: 1.9rem; }
      .hero p { font-size: 0.95rem; }
      .weekend-grid { grid-template-columns: 1fr; }
      .modal { max-width: 100%; border-radius: 16px 16px 0 0; align-self: flex-end; }
      .pill { padding: 8px 13px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       CONFIGURATION — Fill in these two values (see setup guide)
       ═══════════════════════════════════════════════════════════ -->
  <script>
    const CONFIG = {
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxBFyubHyM1YtzM78WIGfg0J32tBSysOwklG-nFqCX4CnSMTN5Ahv8IeB-ZOyPTahwomw/exec',
    };
  </script>

  <div id="app"></div>

  <script>
    /* ─── Date Helpers ─── */
    const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
    const dateKey = (d) => d.toISOString().split('T')[0];
    const fmt = (d, o) => d.toLocaleDateString('en-US', o);
    const gcalDateFmt = (d) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}${m}${day}`;
    };

    /* ─── Generate Saturdays May 2 – Aug 29, 2026 ─── */
    const SATURDAYS = [];
    (function () {
      const d = new Date(2026, 4, 2);
      while (d.getMonth() <= 7) {
        SATURDAYS.push(new Date(d));
        d.setDate(d.getDate() + 7);
      }
    })();

    const RESERVED = new Set([dateKey(SATURDAYS[0]), dateKey(SATURDAYS[SATURDAYS.length - 1])]);

    /* ─── State ─── */
    let bookings = {};
    let loading = true;
    let error = null;

    /* ─── Consecutive Weekend Rule ─── */
    function isBlocked(idx) {
      const booked = (i) => i >= 0 && i < SATURDAYS.length && !!bookings[dateKey(SATURDAYS[i])];
      return (booked(idx - 2) && booked(idx - 1)) ||
             (booked(idx - 1) && booked(idx + 1)) ||
             (booked(idx + 1) && booked(idx + 2));
    }

    function getStatus(idx) {
      const key = dateKey(SATURDAYS[idx]);
      if (RESERVED.has(key)) return 'reserved';
      if (bookings[key]) return 'booked';
      if (isBlocked(idx)) return 'blocked';
      return 'available';
    }

    /* ─── Load Calendar from Google Calendar API ─── */
    async function loadCalendar() {
      loading = true;
      error = null;
      render();

      if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbxBFyubHyM1YtzM78WIGfg0J32tBSysOwklG-nFqCX4CnSMTN5Ahv8IeB-ZOyPTahwomw/exec') {
        loading = false;
        error = 'Calendar not configured yet. All weekends shown as available.';
        render();
        return;
      }

      try {
        const resp = await fetch(CONFIG.SCRIPT_URL);
        if (!resp.ok) throw new Error(`Script error: ${resp.status}`);
        const data = await resp.json();

        if (data.error) {
          console.warn('Calendar warning:', data.error);
        }

        bookings = {};

        for (const ev of (data.events || [])) {
          if (!ev.start || !ev.end) continue;

          const evStart = new Date(ev.start + 'T00:00:00');
          const evEnd = new Date(ev.end + 'T00:00:00');

          for (let i = 0; i < SATURDAYS.length; i++) {
            const sat = SATURDAYS[i];
            const sun = addDays(sat, 1);
            const key = dateKey(sat);
            if (RESERVED.has(key)) continue;

            // Event overlaps with Sat–Sun
            if (evStart <= sun && evEnd > sat) {
              const title = ev.title || 'Guest';
              const gMatch = title.match(/(\d+)\s*guest/i);
              const guests = gMatch ? parseInt(gMatch[1]) : 1;
              const name = title.replace(/\s*[-–—]\s*\d+\s*guest.*/i, '').trim();

              const daysBefore = Math.round((sat - evStart) / 86400000);
              let arrival = 'friday';
              if (daysBefore >= 2) arrival = 'thursday';
              else if (daysBefore <= 0) arrival = 'saturday';

              const daysAfter = Math.round((evEnd - sun) / 86400000);
              const departure = daysAfter >= 1 ? 'monday' : 'sunday';

              bookings[key] = { name, guests, arrival, departure };
            }
          }
        }
      } catch (err) {
        console.error('Calendar error:', err);
        error = 'Could not load calendar. All weekends shown as available.';
      } finally {
        loading = false;
        render();
      }
    }

    /* ─── Build Message ─── */
    function composeMessage(idx, name, guests, arrival, departure) {
      const sat = SATURDAYS[idx];
      const sun = addDays(sat, 1);
      const arrDay = arrival === 'thursday' ? addDays(sat, -2) :
                     arrival === 'friday' ? addDays(sat, -1) : sat;
      const depDay = departure === 'monday' ? addDays(sun, 1) : sun;
      const gcalEnd = addDays(depDay, 1);

      const weekendStr = fmt(sat, { month: 'long', day: 'numeric' }) + '–' +
        (sun.getMonth() === sat.getMonth() ? fmt(sun, { day: 'numeric' }) : fmt(sun, { month: 'long', day: 'numeric' }));
      const arrStr = fmt(arrDay, { weekday: 'long', month: 'long', day: 'numeric' });
      const depStr = departure === 'monday'
        ? 'Early Monday morning (' + fmt(depDay, { month: 'long', day: 'numeric' }) + ')'
        : fmt(depDay, { weekday: 'long', month: 'long', day: 'numeric' });

      const eventTitle = `${name} - ${guests} guest${guests !== 1 ? 's' : ''}`;
      const eventDetails = `Arriving: ${arrStr}\nDeparting: ${depStr}`;
      const calUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(eventTitle)}&dates=${gcalDateFmt(arrDay)}/${gcalDateFmt(gcalEnd)}&details=${encodeURIComponent(eventDetails)}`;

      const msg = `Hey! I'd love to come visit you in Toronto!\n\nWeekend: ${weekendStr}\nName: ${name}\nGuests: ${guests}\nArriving: ${arrStr}\nLeaving: ${depStr}\n\nQuick-add to your calendar:\n${calUrl}\n\nLet me know if this works!`;

      return { text: msg, subject: `Toronto Visit — ${weekendStr}`, calUrl };
    }

    /* ─── Render ─── */
    function render() {
      const app = document.getElementById('app');

      // Group weekends by month, skip reserved
      const months = [];
      let curMonth = null;
      SATURDAYS.forEach((sat, i) => {
        if (RESERVED.has(dateKey(sat))) return;
        const m = fmt(sat, { month: 'long' });
        if (m !== curMonth) {
          months.push({ label: m, items: [] });
          curMonth = m;
        }
        months[months.length - 1].items.push({ sat, idx: i });
      });

      let html = `
        <div class="hero">
          <h1>Toronto Summer 2026</h1>
          <p>Pick a weekend to visit Marshall &amp; Lyn</p>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div><span>Available</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--coral)"></div><span>Booked</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--gray-300)"></div><span>Unavailable</span></div>
        </div>
      `;

      if (error) {
        html += `<div class="error-bar">${error}</div>`;
      }

      if (loading) {
        html += `<div class="loading-bar"><div class="spinner"></div><span>Loading calendar…</span></div>`;
      } else {
        html += '<div class="content">';
        for (const month of months) {
          html += `<div class="month-section"><h2 class="month-label">${month.label}</h2><div class="weekend-grid">`;
          for (const { sat, idx } of month.items) {
            const status = getStatus(idx);
            const key = dateKey(sat);
            const sun = addDays(sat, 1);
            const booking = bookings[key];

            const dateLabel = fmt(sat, { month: 'short', day: 'numeric' }) + '–' +
              (sun.getMonth() === sat.getMonth() ? fmt(sun, { day: 'numeric' }) : fmt(sun, { month: 'short', day: 'numeric' }));

            let inner = `<div class="card-dates">${dateLabel}</div>`;

            if (status === 'available') {
              inner += `<span class="card-badge badge-available">Available</span>`;
            } else if (status === 'booked' && booking) {
              inner += `<span class="card-badge badge-booked">Booked</span>`;
              inner += `<div class="card-guest">${escapeHtml(booking.name)}</div>`;
              inner += `<div class="card-detail">${booking.guests} guest${booking.guests !== 1 ? 's' : ''} · Arriving ${capitalize(booking.arrival)}${booking.departure === 'monday' ? ' · Leaving Monday AM' : ''}</div>`;
            } else if (status === 'blocked') {
              inner += `<span class="card-badge badge-blocked">Unavailable</span>`;
              inner += `<div class="card-detail" style="margin-top:6px">Breather weekend</div>`;
            }

            const clickable = status === 'available' ? `onclick="openBooking(${idx})"` : '';
            html += `<div class="weekend-card ${status}" ${clickable}>${inner}</div>`;
          }
          html += '</div></div>';
        }
        html += '</div>';
      }

      app.innerHTML = html;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    /* ─── Booking Modal ─── */
    let currentBookingIdx = null;
    let formState = { name: '', guests: 2, arrival: 'friday', departure: 'sunday' };

    function openBooking(idx) {
      currentBookingIdx = idx;
      formState = { name: '', guests: 2, arrival: 'friday', departure: 'sunday' };
      renderBookingModal();
    }

    function renderBookingModal() {
      removeModal();
      if (currentBookingIdx === null) return;

      const sat = SATURDAYS[currentBookingIdx];
      const sun = addDays(sat, 1);

      const arrivalOpts = [
        { key: 'thursday', label: fmt(addDays(sat, -2), { weekday: 'short', month: 'short', day: 'numeric' }) },
        { key: 'friday', label: fmt(addDays(sat, -1), { weekday: 'short', month: 'short', day: 'numeric' }) },
        { key: 'saturday', label: fmt(sat, { weekday: 'short', month: 'short', day: 'numeric' }) },
      ];
      const departureOpts = [
        { key: 'sunday', label: fmt(addDays(sat, 1), { weekday: 'short', month: 'short', day: 'numeric' }) },
        { key: 'monday', label: 'Early Mon ' + fmt(addDays(sat, 2), { month: 'short', day: 'numeric' }) },
      ];

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.id = 'modal-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2>Request This Weekend</h2>
            <p>${fmt(sat, { month: 'long', day: 'numeric' })}–${fmt(sun, { month: 'long', day: 'numeric', year: 'numeric' })}</p>
          </div>
          <div class="modal-body">
            <div class="field">
              <label>Your Name</label>
              <input type="text" id="field-name" placeholder="e.g. Sarah & Mike" autofocus>
            </div>
            <div class="field">
              <label>Number of Guests</label>
              <input type="number" id="field-guests" min="1" max="20" value="2">
            </div>
            <div class="field">
              <label>Arriving</label>
              <div class="pill-group" id="arrival-pills">
                ${arrivalOpts.map(o => `<button class="pill ${formState.arrival === o.key ? 'active' : ''}" data-key="${o.key}">${o.label}</button>`).join('')}
              </div>
            </div>
            <div class="field">
              <label>Departing</label>
              <div class="pill-group" id="departure-pills">
                ${departureOpts.map(o => `<button class="pill ${formState.departure === o.key ? 'active' : ''}" data-key="${o.key}">${o.label}</button>`).join('')}
              </div>
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="submit-btn" onclick="submitBooking()">Compose Request</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);

      // Wire up pill buttons
      overlay.querySelectorAll('#arrival-pills .pill').forEach(btn => {
        btn.onclick = () => {
          formState.arrival = btn.dataset.key;
          overlay.querySelectorAll('#arrival-pills .pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
      });
      overlay.querySelectorAll('#departure-pills .pill').forEach(btn => {
        btn.onclick = () => {
          formState.departure = btn.dataset.key;
          overlay.querySelectorAll('#departure-pills .pill').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
      });

      // Focus name field
      setTimeout(() => document.getElementById('field-name')?.focus(), 100);
    }

    function submitBooking() {
      const name = document.getElementById('field-name')?.value?.trim();
      const guests = parseInt(document.getElementById('field-guests')?.value) || 2;
      if (!name) return;

      const msg = composeMessage(currentBookingIdx, name, guests, formState.arrival, formState.departure);
      closeModal();
      showMessageModal(msg);
    }

    /* ─── Message Modal ─── */
    function showMessageModal(msg) {
      removeModal();

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.id = 'modal-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) removeModal(); };

      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2>Send Your Request</h2>
            <p>Send Marshall &amp; Lyn your visit details</p>
          </div>
          <div class="modal-body">
            <div class="message-box">${escapeHtml(msg.text)}</div>
            <div class="action-buttons">
              <a class="action-btn" href="mailto:?subject=${encodeURIComponent(msg.subject)}&body=${encodeURIComponent(msg.text)}">✉️ Email</a>
              <a class="action-btn" href="sms:?body=${encodeURIComponent(msg.text)}">💬 Text</a>
            </div>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);
    }

    function closeModal() {
      currentBookingIdx = null;
      removeModal();
    }

    function removeModal() {
      document.getElementById('modal-overlay')?.remove();
    }

    /* ─── Init ─── */
    loadCalendar();
  </script>
</body>
</html>
